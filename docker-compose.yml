services:
  postgres:
    image: postgres:15-alpine
    container_name: kitchcue-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kitchcue_db
    volumes:
      - kitchcue_postgres_data:/var/lib/postgresql/data

volumes:
  kitchcue_postgres_data: